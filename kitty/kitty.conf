# OSX
#font_family JetBrainsMono Nerd Font Mono Light
#italic_font JetBrainsMono Nerd Font Mono Light Italic
#bold_font JetBrainsMono Nerd Font Mono Regular
#bold_italic_font JetBrainsMono Nerd Font Mono Italic
# LINUX
bold_italic_font JetBrainsMono NF Medium Italic
font_family JetBrainsMono NF Light
italic_font JetBrainsMono NF Italic
bold_font JetBrainsMono NF Medium
#bold_italic_font JetBrainsMono NF SemiBold Italic
#font_family Lilex Nerd Font Mono Regular
#italic_font Lilex Nerd Font Mono Italic
#bold_font Lilex Nerd Font Mono Medium
#bold_italic_font Lilex Nerd Font Mono Medium Italic

# LINUX
font_size 13
hide_window_decorations yes
initial_window_width 2560
initial_window_height 1440
#
# OSX
#font_size 16

adjust_line_height 200%

cursor_shape block
shell_integration no-cursor
cursor_blink_interval 0

enable_audio_bell 0
window_padding_width 5
clipboard_control write-clipboard write-primary read-clipboard read-primary


# BEGIN_KITTY_THEME
# Catppuccin-Macchiato
include current-theme.conf
# END_KITTY_THEME
